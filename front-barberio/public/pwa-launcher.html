<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carregando Empresa</title>
    <style>
      body {
        font-family: sans-serif;
        text-align: center;
        margin-top: 30vh;
        color: #555;
      }
    </style>
  </head>
  <body>
    <p>Carregando Agendamento</p>

    <script>
      // Função para ler cookie por nome
      function getCookie(name) {
        const match = document.cookie.match(
          new RegExp("(^| )" + name + "=([^;]+)")
        );
        return match ? decodeURIComponent(match[2]) : null;
      }

      const empresaRef = getCookie("ref");
      const ref = empresaRef;

      // Redireciona para a empresa correspondente
      const target = ref ? `/home?ref=${ref}` : "/login";
      window.location.replace(target);
    </script>
  </body>
</html>
